name: Health Ping

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://whats-anima.vercel.app/api/cron/health-ping
